<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>8 Ball Pool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
canvas{display:block;position:absolute;cursor:crosshair}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const W = 1400, H = 780;
const SB = 260;
const TX = 440, TY = 200, TW = 760, TH = 380;
const CS = 24, BR = 15, PR = 17;
const MAX_POW = 50;
const SUBSTEPS = 24;
const FRIC = 0.9945;
const C_REST = 0.55;
const B_REST = 0.72;
const MIN_SPD = 0.08;
const FDT = 1 / 120;

const PO = 10;
const POCKETS = [
  [TX + PO, TY + PO], [TX + TW / 2, TY + PO], [TX + TW - PO, TY + PO],
  [TX + PO, TY + TH - PO], [TX + TW / 2, TY + TH - PO], [TX + TW - PO, TY + TH - PO]
];

const COLORS = {
  0:[248,248,248],1:[240,190,0],2:[20,50,210],3:[210,30,30],
  4:[130,0,145],5:[240,110,0],6:[0,155,35],7:[145,20,20],
  8:[18,18,18],9:[240,190,0],10:[20,50,210],11:[210,30,30],
  12:[130,0,145],13:[240,110,0],14:[0,155,35],15:[145,20,20]
};

// ═══════════════════════════════════════════════════
//  SOUND ENGINE (Web Audio API)
// ═══════════════════════════════════════════════════
class SoundEngine {
  constructor() {
    this.ctx = null;
    this.enabled = false;
    this.initOnClick = () => {
      if (!this.ctx) {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.enabled = true;
      }
    };
    document.addEventListener('mousedown', this.initOnClick, { once: false });
    document.addEventListener('touchstart', this.initOnClick, { once: false });
  }

  play(type, vol) {
    if (!this.enabled || !this.ctx) return;
    vol = Math.min(1, vol);
    if (type === 'ball') this._ballHit(vol);
    else if (type === 'cushion') this._cushionHit(vol);
    else if (type === 'pocket') this._pocketSound(vol);
    else if (type === 'cue') this._cueHit(vol);
  }

  _ballHit(vol) {
    const c = this.ctx, t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
    o.type = 'sine';
    o.frequency.setValueAtTime(800 + Math.random() * 400, t);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.08);
    f.type = 'lowpass'; f.frequency.value = 2000;
    g.gain.setValueAtTime(vol * 0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(f); f.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.15);

    // Noise burst for click
    const buf = c.createBuffer(1, c.sampleRate * 0.02, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * 0.15));
    const ns = c.createBufferSource(), ng = c.createGain(), nf = c.createBiquadFilter();
    ns.buffer = buf; nf.type = 'bandpass'; nf.frequency.value = 3000; nf.Q.value = 1;
    ng.gain.setValueAtTime(vol * 0.4, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    ns.connect(nf); nf.connect(ng); ng.connect(c.destination);
    ns.start(t);
  }

  _cushionHit(vol) {
    const c = this.ctx, t = c.currentTime;
    const buf = c.createBuffer(1, c.sampleRate * 0.06, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * 0.2));
    const s = c.createBufferSource(), g = c.createGain(), f = c.createBiquadFilter();
    s.buffer = buf; f.type = 'lowpass'; f.frequency.value = 1200;
    g.gain.setValueAtTime(vol * 0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    s.connect(f); f.connect(g); g.connect(c.destination);
    s.start(t);

    const o = c.createOscillator(), og = c.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(150 + Math.random() * 80, t);
    o.frequency.exponentialRampToValueAtTime(60, t + 0.1);
    og.gain.setValueAtTime(vol * 0.15, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(og); og.connect(c.destination);
    o.start(t); o.stop(t + 0.12);
  }

  _pocketSound(vol) {
    const c = this.ctx, t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(80, t + 0.25);
    g.gain.setValueAtTime(vol * 0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.35);

    // Thump
    const buf = c.createBuffer(1, c.sampleRate * 0.1, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * 0.1));
    const s = c.createBufferSource(), sg = c.createGain(), sf = c.createBiquadFilter();
    s.buffer = buf; sf.type = 'lowpass'; sf.frequency.value = 500;
    sg.gain.setValueAtTime(vol * 0.4, t + 0.02);
    sg.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    s.connect(sf); sf.connect(sg); sg.connect(c.destination);
    s.start(t + 0.02);
  }

  _cueHit(vol) {
    const c = this.ctx, t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
    o.type = 'triangle';
    o.frequency.setValueAtTime(600, t);
    o.frequency.exponentialRampToValueAtTime(150, t + 0.06);
    f.type = 'lowpass'; f.frequency.value = 2500;
    g.gain.setValueAtTime(vol * 0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(f); f.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.12);

    const buf = c.createBuffer(1, c.sampleRate * 0.015, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * 0.08));
    const s = c.createBufferSource(), sg = c.createGain();
    s.buffer = buf;
    sg.gain.setValueAtTime(vol * 0.5, t);
    sg.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    s.connect(sg); sg.connect(c.destination);
    s.start(t);
  }
}

// ═══════════════════════════════════════════════════
//  GAME
// ═══════════════════════════════════════════════════
class Game {
  constructor() {
    this.cv = document.getElementById('c');
    this.ctx = this.cv.getContext('2d');
    this.cv.width = W; this.cv.height = H;
    this.mouse = { x: W / 2, y: H / 2 };
    this.mode = null;
    this.menuBtns = {};
    this.snd = new SoundEngine();

    // Cue animation state
    this.cueAnim = null; // {phase:'back'|'strike'|'follow', t:0, power:0, angle:0}
    // Pocket animation
    this.pocketAnims = [];

    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.cv.addEventListener('mousedown', e => this.onDown(e));
    this.cv.addEventListener('mousemove', e => this.onMove(e));
    this.cv.addEventListener('mouseup', e => this.onUp(e));
    this.cv.addEventListener('contextmenu', e => e.preventDefault());

    // Touch support
    this.cv.addEventListener('touchstart', e => { e.preventDefault(); this.onDown(this._te(e)); }, { passive: false });
    this.cv.addEventListener('touchmove', e => { e.preventDefault(); this.onMove(this._te(e)); }, { passive: false });
    this.cv.addEventListener('touchend', e => { e.preventDefault(); this.onUp(this._te(e)); }, { passive: false });

    window.addEventListener('keydown', e => {
      if (e.key === 'Escape') this.mode = null;
      if ((e.key === 'r' || e.key === 'R') && this.mode) this.init(this.mode);
    });

    this.prerenderBalls();
    this.prerenderTable();
    this.lastT = performance.now();
    requestAnimationFrame(t => this.loop(t));
  }

  _te(e) {
    const t = e.changedTouches[0];
    return { clientX: t.clientX, clientY: t.clientY, button: 0 };
  }

  resize() {
    const w = window.innerWidth, h = window.innerHeight;
    const s = Math.min(w / W, h / H);
    this.cv.style.width = (W * s | 0) + 'px';
    this.cv.style.height = (H * s | 0) + 'px';
    this.cv.style.left = ((w - W * s) / 2 | 0) + 'px';
    this.cv.style.top = ((h - H * s) / 2 | 0) + 'px';
    this.cssScale = s;
  }

  mpos(e) {
    const r = this.cv.getBoundingClientRect();
    return { x: (e.clientX - r.left) * W / r.width, y: (e.clientY - r.top) * H / r.height };
  }

  // ─── INIT ──────────────────────────────────────
  init(mode) {
    this.mode = mode;
    this.balls = [];
    this.phase = 'AIM';
    this.cueAngle = Math.PI;
    this.shotAngle = 0;
    this.lockedAngle = 0;
    this.charging = false;
    this.power = 0;
    this.currentPlayer = 1;
    this.player1 = { name: 'Player 1', type: null };
    this.player2 = { name: 'Player 2', type: null };
    this.firstHit = null;
    this.pocketedThisTurn = [];
    this.cuePocketed = false;
    this.isBreak = true;
    this.winner = 0;
    this.msg = ''; this.msgTimer = 0;
    this.accum = 0;
    this.cueAnim = null;
    this.pocketAnims = [];

    // Cue ball
    this.balls.push({ num: 0, x: TX + TW * 0.25, y: TY + TH * 0.5, vx: 0, vy: 0, pocketed: false, rot: 0 });

    // Rack
    const rows = [[1], [2, 9], [3, 8, 10], [4, 11, 7, 12], [5, 13, 6, 14, 15]];
    const ax = TX + TW * 0.72, ay = TY + TH * 0.5;
    const gap = BR * 2.05, rdx = gap * Math.cos(Math.PI / 6);
    for (let r = 0; r < rows.length; r++) {
      const cnt = rows[r].length;
      for (let c = 0; c < cnt; c++) {
        this.balls.push({
          num: rows[r][c],
          x: ax + r * rdx, y: ay + (c - (cnt - 1) / 2) * gap,
          vx: 0, vy: 0, pocketed: false, rot: 0
        });
      }
    }
  }

  get cueBall() { return this.balls[0]; }
  get cp() { return this.currentPlayer === 1 ? this.player1 : this.player2; }
  get op() { return this.currentPlayer === 1 ? this.player2 : this.player1; }

  // ─── PRERENDER BALLS ───────────────────────────
  prerenderBalls() {
    this.ballImgs = {};
    const S = 2; // render at 2x resolution for sharpness
    for (let n = 0; n <= 15; n++) {
      const pad = 3, sz = (BR + pad) * 2 * S;
      const c = document.createElement('canvas');
      c.width = sz; c.height = sz;
      const x = sz / 2, y = sz / 2, r = BR * S;
      const ct = c.getContext('2d');
      const col = COLORS[n];
      const stripe = n >= 9;

      ct.save();
      ct.beginPath(); ct.arc(x, y, r, 0, Math.PI * 2); ct.closePath(); ct.clip();

      if (n === 0) {
        const g = ct.createRadialGradient(x - r * .3, y - r * .35, 0, x, y, r);
        g.addColorStop(0, '#fff'); g.addColorStop(0.5, '#f4f4f4'); g.addColorStop(0.8, '#e0e0e0'); g.addColorStop(1, '#b0b0b0');
        ct.fillStyle = g; ct.fillRect(0, 0, sz, sz);
      } else if (stripe) {
        ct.fillStyle = '#f0f0f0'; ct.fillRect(0, 0, sz, sz);
        ct.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
        ct.fillRect(0, y - r * .44, sz, r * .88);
        const g = ct.createRadialGradient(x - r * .3, y - r * .35, 0, x, y, r);
        g.addColorStop(0, 'rgba(255,255,255,0.35)');
        g.addColorStop(0.4, 'rgba(255,255,255,0.1)');
        g.addColorStop(1, 'rgba(0,0,0,0.35)');
        ct.fillStyle = g; ct.fillRect(0, 0, sz, sz);
      } else {
        const g = ct.createRadialGradient(x - r * .3, y - r * .35, 0, x, y, r);
        g.addColorStop(0, `rgb(${Math.min(255, col[0] * 1.5) | 0},${Math.min(255, col[1] * 1.5) | 0},${Math.min(255, col[2] * 1.5) | 0})`);
        g.addColorStop(0.45, `rgb(${col[0]},${col[1]},${col[2]})`);
        g.addColorStop(1, `rgb(${col[0] * .4 | 0},${col[1] * .4 | 0},${col[2] * .4 | 0})`);
        ct.fillStyle = g; ct.fillRect(0, 0, sz, sz);
      }
      ct.restore();

      // Number circle (bigger, clearer)
      if (n > 0) {
        ct.fillStyle = '#fff';
        ct.beginPath(); ct.arc(x, y, r * .4, 0, Math.PI * 2); ct.fill();
        ct.strokeStyle = 'rgba(0,0,0,0.1)'; ct.lineWidth = S * 0.5;
        ct.beginPath(); ct.arc(x, y, r * .4, 0, Math.PI * 2); ct.stroke();
        ct.fillStyle = '#111'; ct.font = `bold ${r * .52 | 0}px Arial`;
        ct.textAlign = 'center'; ct.textBaseline = 'middle';
        ct.fillText(String(n), x, y + S * 0.5);
      }

      // Highlight
      const hlg = ct.createRadialGradient(x - r * .28, y - r * .28, 0, x - r * .28, y - r * .28, r * .35);
      hlg.addColorStop(0, 'rgba(255,255,255,0.7)'); hlg.addColorStop(1, 'rgba(255,255,255,0)');
      ct.fillStyle = hlg; ct.beginPath(); ct.arc(x - r * .28, y - r * .28, r * .35, 0, Math.PI * 2); ct.fill();

      // Edge
      ct.strokeStyle = 'rgba(0,0,0,0.2)'; ct.lineWidth = S;
      ct.beginPath(); ct.arc(x, y, r - S * 0.5, 0, Math.PI * 2); ct.stroke();

      this.ballImgs[n] = c;
    }
  }

  // ─── PRERENDER TABLE ───────────────────────────
  prerenderTable() {
    this.tableImg = document.createElement('canvas');
    this.tableImg.width = W; this.tableImg.height = H;
    const ct = this.tableImg.getContext('2d');

    ct.fillStyle = '#0f0a08'; ct.fillRect(0, 0, W, H);

    // Wood border (multiple layers for depth)
    this._rrect(ct, TX - CS - 6, TY - CS - 6, TW + (CS + 6) * 2, TH + (CS + 6) * 2, 16);
    ct.fillStyle = '#1a0c04'; ct.fill();
    this._rrect(ct, TX - CS - 4, TY - CS - 4, TW + (CS + 4) * 2, TH + (CS + 4) * 2, 14);
    ct.fillStyle = '#2d1608'; ct.fill();
    this._rrect(ct, TX - CS, TY - CS, TW + CS * 2, TH + CS * 2, 12);
    ct.fillStyle = '#3c2010'; ct.fill();

    // Wood grain texture
    ct.save();
    this._rrect(ct, TX - CS, TY - CS, TW + CS * 2, TH + CS * 2, 12);
    ct.clip();
    for (let i = 0; i < 60; i++) {
      const gy = TY - CS + Math.random() * (TH + CS * 2);
      ct.strokeStyle = `rgba(${Math.random() > 0.5 ? '80,50,20' : '30,15,5'},${0.08 + Math.random() * 0.06})`;
      ct.lineWidth = 0.5 + Math.random();
      ct.beginPath(); ct.moveTo(TX - CS, gy + Math.random() * 4);
      for (let x = TX - CS; x < TX + TW + CS; x += 20) ct.lineTo(x, gy + Math.sin(x * 0.01) * 3 + Math.random() * 2);
      ct.stroke();
    }
    ct.restore();

    this._rrect(ct, TX - CS + 2, TY - CS + 2, TW + (CS - 2) * 2, TH + (CS - 2) * 2, 10);
    ct.strokeStyle = '#503018'; ct.lineWidth = 2; ct.stroke();

    // Inner edge highlight
    this._rrect(ct, TX - CS + 1, TY - CS + 1, TW + (CS - 1) * 2, TH + (CS - 1) * 2, 11);
    ct.strokeStyle = 'rgba(100,60,25,0.3)'; ct.lineWidth = 1; ct.stroke();

    // Felt
    ct.fillStyle = '#165a1e'; ct.fillRect(TX, TY, TW, TH);
    // Felt texture (more detailed)
    for (let i = 0; i < TH; i += 2) {
      ct.fillStyle = `rgba(${Math.sin(i * .04) > 0 ? '255,255,255' : '0,0,0'},0.015)`;
      ct.fillRect(TX, TY + i, TW, 1);
    }
    // Slight noise on felt
    for (let i = 0; i < 200; i++) {
      const fx = TX + Math.random() * TW, fy = TY + Math.random() * TH;
      ct.fillStyle = `rgba(${Math.random() > 0.5 ? '255,255,255' : '0,0,0'},0.02)`;
      ct.fillRect(fx, fy, 2, 2);
    }

    // 3D Cushions
    this._draw3DCushions(ct);

    // Center line + head spot
    ct.strokeStyle = 'rgba(18,72,28,0.6)'; ct.lineWidth = 1;
    ct.beginPath(); ct.moveTo(TX + TW / 2, TY + 8); ct.lineTo(TX + TW / 2, TY + TH - 8); ct.stroke();
    ct.fillStyle = 'rgba(18,72,28,0.8)'; ct.beginPath(); ct.arc(TX + TW / 4, TY + TH / 2, 3, 0, Math.PI * 2); ct.fill();
    // Foot spot
    ct.beginPath(); ct.arc(TX + TW * 0.72, TY + TH / 2, 3, 0, Math.PI * 2); ct.fill();

    // Diamonds
    const hw = TW / 2, ryt = TY - CS / 2, ryb = TY + TH + CS / 2;
    const rxl = TX - CS / 2, rxr = TX + TW + CS / 2;
    for (let i = 1; i <= 3; i++) {
      this._dia(ct, TX + hw * i / 4, ryt); this._dia(ct, TX + hw + hw * i / 4, ryt);
      this._dia(ct, TX + hw * i / 4, ryb); this._dia(ct, TX + hw + hw * i / 4, ryb);
    }
    for (let i = 1; i <= 3; i++) {
      this._dia(ct, rxl, TY + TH * i / 4); this._dia(ct, rxr, TY + TH * i / 4);
    }

    // Pockets with depth
    for (const [px, py] of POCKETS) {
      // Outer shadow
      const pg = ct.createRadialGradient(px, py, PR - 2, px, py, PR + 8);
      pg.addColorStop(0, '#020202'); pg.addColorStop(0.6, '#050505'); pg.addColorStop(1, 'rgba(5,5,5,0)');
      ct.fillStyle = pg; ct.beginPath(); ct.arc(px, py, PR + 8, 0, Math.PI * 2); ct.fill();

      // Pocket hole
      ct.fillStyle = '#030303'; ct.beginPath(); ct.arc(px, py, PR + 2, 0, Math.PI * 2); ct.fill();

      // Inner depth gradient
      const ig = ct.createRadialGradient(px - 3, py - 3, 0, px, py, PR);
      ig.addColorStop(0, '#0a0a0a'); ig.addColorStop(1, '#020202');
      ct.fillStyle = ig; ct.beginPath(); ct.arc(px, py, PR, 0, Math.PI * 2); ct.fill();

      // Metal rim
      ct.strokeStyle = '#2a1a0e'; ct.lineWidth = 2.5;
      ct.beginPath(); ct.arc(px, py, PR + 2, 0, Math.PI * 2); ct.stroke();
      ct.strokeStyle = 'rgba(60,35,15,0.4)'; ct.lineWidth = 1;
      ct.beginPath(); ct.arc(px, py, PR + 3.5, 0, Math.PI * 2); ct.stroke();
    }

    // Overhead lamp lighting effect
    const lampX = TX + TW / 2, lampY = TY + TH / 2;
    const lampG = ct.createRadialGradient(lampX, lampY, 0, lampX, lampY, TW * 0.6);
    lampG.addColorStop(0, 'rgba(255,255,220,0.06)');
    lampG.addColorStop(0.3, 'rgba(255,255,200,0.03)');
    lampG.addColorStop(0.7, 'rgba(0,0,0,0.02)');
    lampG.addColorStop(1, 'rgba(0,0,0,0.08)');
    ct.fillStyle = lampG;
    ct.fillRect(TX, TY, TW, TH);
  }

  _draw3DCushions(ct) {
    const cw = 6; // cushion visible width
    const colors = {
      face: '#1a8a2a',
      top: '#22a836',
      shadow: '#0e5a16'
    };

    // Top cushion
    ct.fillStyle = colors.face;
    ct.beginPath();
    ct.moveTo(TX + PR + 10, TY);
    ct.lineTo(TX + TW / 2 - PR - 5, TY);
    ct.lineTo(TX + TW / 2 - PR - 2, TY + cw);
    ct.lineTo(TX + PR + 13, TY + cw);
    ct.closePath(); ct.fill();

    ct.beginPath();
    ct.moveTo(TX + TW / 2 + PR + 5, TY);
    ct.lineTo(TX + TW - PR - 10, TY);
    ct.lineTo(TX + TW - PR - 13, TY + cw);
    ct.lineTo(TX + TW / 2 + PR + 2, TY + cw);
    ct.closePath(); ct.fill();

    // Bottom cushion
    ct.beginPath();
    ct.moveTo(TX + PR + 10, TY + TH);
    ct.lineTo(TX + TW / 2 - PR - 5, TY + TH);
    ct.lineTo(TX + TW / 2 - PR - 2, TY + TH - cw);
    ct.lineTo(TX + PR + 13, TY + TH - cw);
    ct.closePath(); ct.fill();

    ct.beginPath();
    ct.moveTo(TX + TW / 2 + PR + 5, TY + TH);
    ct.lineTo(TX + TW - PR - 10, TY + TH);
    ct.lineTo(TX + TW - PR - 13, TY + TH - cw);
    ct.lineTo(TX + TW / 2 + PR + 2, TY + TH - cw);
    ct.closePath(); ct.fill();

    // Left cushion
    ct.beginPath();
    ct.moveTo(TX, TY + PR + 10);
    ct.lineTo(TX, TY + TH - PR - 10);
    ct.lineTo(TX + cw, TY + TH - PR - 13);
    ct.lineTo(TX + cw, TY + PR + 13);
    ct.closePath(); ct.fill();

    // Right cushion
    ct.beginPath();
    ct.moveTo(TX + TW, TY + PR + 10);
    ct.lineTo(TX + TW, TY + TH - PR - 10);
    ct.lineTo(TX + TW - cw, TY + TH - PR - 13);
    ct.lineTo(TX + TW - cw, TY + PR + 13);
    ct.closePath(); ct.fill();

    // Highlight on cushion tops
    ct.fillStyle = colors.top;
    ct.globalAlpha = 0.4;
    // Top
    ct.fillRect(TX + PR + 13, TY, TW / 2 - PR * 2 - 18, 2);
    ct.fillRect(TX + TW / 2 + PR + 2, TY, TW / 2 - PR * 2 - 12, 2);
    // Bottom
    ct.fillRect(TX + PR + 13, TY + TH - 2, TW / 2 - PR * 2 - 18, 2);
    ct.fillRect(TX + TW / 2 + PR + 2, TY + TH - 2, TW / 2 - PR * 2 - 12, 2);
    // Left
    ct.fillRect(TX, TY + PR + 13, 2, TH - PR * 2 - 26);
    // Right
    ct.fillRect(TX + TW - 2, TY + PR + 13, 2, TH - PR * 2 - 26);
    ct.globalAlpha = 1.0;

    // Shadow at cushion base
    ct.fillStyle = colors.shadow;
    ct.globalAlpha = 0.3;
    ct.fillRect(TX + cw, TY + cw, TW - cw * 2, 2);
    ct.fillRect(TX + cw, TY + TH - cw - 2, TW - cw * 2, 2);
    ct.fillRect(TX + cw, TY + cw, 2, TH - cw * 2);
    ct.fillRect(TX + TW - cw - 2, TY + cw, 2, TH - cw * 2);
    ct.globalAlpha = 1.0;
  }

  _rrect(ct, x, y, w, h, r) {
    ct.beginPath();
    ct.moveTo(x + r, y); ct.lineTo(x + w - r, y);
    ct.quadraticCurveTo(x + w, y, x + w, y + r); ct.lineTo(x + w, y + h - r);
    ct.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ct.lineTo(x + r, y + h);
    ct.quadraticCurveTo(x, y + h, x, y + h - r); ct.lineTo(x, y + r);
    ct.quadraticCurveTo(x, y, x + r, y); ct.closePath();
  }

  _dia(ct, cx, cy) {
    const s = 4;
    ct.fillStyle = '#b8860b';
    ct.beginPath(); ct.moveTo(cx, cy - s); ct.lineTo(cx + s, cy);
    ct.lineTo(cx, cy + s); ct.lineTo(cx - s, cy); ct.closePath(); ct.fill();
    ct.strokeStyle = '#dca828'; ct.lineWidth = 1; ct.stroke();
    // Mother of pearl inlay effect
    const ig = ct.createRadialGradient(cx - 1, cy - 1, 0, cx, cy, s);
    ig.addColorStop(0, 'rgba(255,255,230,0.3)'); ig.addColorStop(1, 'rgba(255,255,230,0)');
    ct.fillStyle = ig;
    ct.beginPath(); ct.moveTo(cx, cy - s); ct.lineTo(cx + s, cy);
    ct.lineTo(cx, cy + s); ct.lineTo(cx - s, cy); ct.closePath(); ct.fill();
  }

  // ─── INPUT ─────────────────────────────────────
  onDown(e) {
    if (e.button !== 0) return;
    const p = this.mpos(e); this.mouse = p;

    if (!this.mode) {
      for (const [id, btn] of Object.entries(this.menuBtns))
        if (p.x >= btn.x && p.x <= btn.x + btn.w && p.y >= btn.y && p.y <= btn.y + btn.h)
          { this.init(id); return; }
      return;
    }

    if (this.phase === 'GAME_OVER') { this.init(this.mode); return; }
    if (p.x >= 40 && p.x <= SB - 40 && p.y >= H - 75 && p.y <= H - 37) { this.init(this.mode); return; }
    if (this.phase === 'BALL_IN_HAND') { this.placeCue(); return; }

    if (this.phase === 'AIM' && !this.cueBall.pocketed && p.x > SB && !this.cueAnim) {
      this.charging = true; this.power = 0;
      this.chargeStart = { ...p };
      this.shotAngle = this.cueAngle + Math.PI;
      this.lockedAngle = this.cueAngle;
    }
  }

  onMove(e) { this.mouse = this.mpos(e); }

  onUp(e) {
    if (this.charging) {
      if (this.power > 0.02) {
        // Start cue animation instead of immediately shooting
        this.cueAnim = {
          phase: 'back', t: 0,
          power: this.power,
          angle: this.shotAngle,
          lockedAngle: this.lockedAngle,
          duration: 0.12 + this.power * 0.08
        };
        this.phase = 'CUE_ANIM';
      }
      this.charging = false; this.power = 0;
    }
  }

  executeCueShot(power, angle) {
    const p = power <= 0.5 ? power * power : power <= 0.8 ? 0.25 + (power - 0.5) * 0.4 : 0.37 + (power - 0.8) * 0.3;
    const spd = p * MAX_POW;
    this.cueBall.vx = Math.cos(angle) * spd;
    this.cueBall.vy = Math.sin(angle) * spd;
    this.snd.play('cue', 0.3 + power * 0.7);
    this.phase = 'MOVING';
    this.firstHit = null; this.pocketedThisTurn = [];
    this.cuePocketed = false; this.accum = 0;
  }

  placeCue() {
    const { x, y } = this.mouse;
    if (x < TX + BR || x > TX + TW - BR || y < TY + BR || y > TY + TH - BR) return;
    for (const b of this.balls)
      if (!b.pocketed && b !== this.cueBall && Math.hypot(b.x - x, b.y - y) < BR * 2 + 2) return;
    this.cueBall.x = x; this.cueBall.y = y;
    this.cueBall.pocketed = false; this.cueBall.vx = this.cueBall.vy = 0;
    this.phase = 'AIM';
  }

  // ─── UPDATE ────────────────────────────────────
  update(dt) {
    if (this.msgTimer > 0) this.msgTimer -= dt;
    if (!this.mode) return;

    // Pocket animations
    for (let i = this.pocketAnims.length - 1; i >= 0; i--) {
      this.pocketAnims[i].t += dt;
      if (this.pocketAnims[i].t > 0.4) this.pocketAnims.splice(i, 1);
    }

    // Cue animation
    if (this.cueAnim) {
      this.cueAnim.t += dt;
      const ca = this.cueAnim;
      if (ca.phase === 'back') {
        if (ca.t >= ca.duration) {
          ca.phase = 'strike'; ca.t = 0;
          ca.strikeDur = 0.04 + (1 - ca.power) * 0.03;
        }
      } else if (ca.phase === 'strike') {
        if (ca.t >= ca.strikeDur) {
          this.executeCueShot(ca.power, ca.angle);
          ca.phase = 'follow'; ca.t = 0;
        }
      } else if (ca.phase === 'follow') {
        if (ca.t >= 0.15) this.cueAnim = null;
      }
    }

    if (this.phase === 'AIM' && !this.cueBall.pocketed) {
      if (this.charging) {
        this.cueAngle = this.lockedAngle;
        const dx = this.mouse.x - this.chargeStart.x, dy = this.mouse.y - this.chargeStart.y;
        this.power = Math.min(1, Math.hypot(dx, dy) / 200);
      } else {
        this.cueAngle = Math.atan2(this.mouse.y - this.cueBall.y, this.mouse.x - this.cueBall.x);
      }
    }

    if (this.phase === 'MOVING') {
      this.accum += Math.min(dt, 0.05);
      while (this.accum >= FDT) { this.accum -= FDT; this.fixedStep(); }
    }
  }

  fixedStep() {
    for (let s = 0; s < SUBSTEPS; s++) {
      for (const b of this.balls) {
        if (b.pocketed) continue;
        b.x += b.vx / SUBSTEPS; b.y += b.vy / SUBSTEPS;
      }

      // Cushions
      for (const b of this.balls) {
        if (b.pocketed) continue;
        let np = false;
        for (const p of POCKETS) if (Math.hypot(b.x - p[0], b.y - p[1]) < PR + BR + 5) { np = true; break; }
        if (!np) {
          if (b.x - BR < TX) {
            b.x = TX + BR;
            const spd = Math.hypot(b.vx, b.vy);
            const r = C_REST - Math.abs(b.vy) / (Math.abs(b.vx) + Math.abs(b.vy) + 1) * 0.1;
            b.vx = Math.abs(b.vx) * r; b.vy *= 0.96;
            if (spd > 2) this.snd.play('cushion', Math.min(1, spd / 30));
          }
          if (b.x + BR > TX + TW) {
            b.x = TX + TW - BR;
            const spd = Math.hypot(b.vx, b.vy);
            const r = C_REST - Math.abs(b.vy) / (Math.abs(b.vx) + Math.abs(b.vy) + 1) * 0.1;
            b.vx = -Math.abs(b.vx) * r; b.vy *= 0.96;
            if (spd > 2) this.snd.play('cushion', Math.min(1, spd / 30));
          }
          if (b.y - BR < TY) {
            b.y = TY + BR;
            const spd = Math.hypot(b.vx, b.vy);
            const r = C_REST - Math.abs(b.vx) / (Math.abs(b.vx) + Math.abs(b.vy) + 1) * 0.1;
            b.vy = Math.abs(b.vy) * r; b.vx *= 0.96;
            if (spd > 2) this.snd.play('cushion', Math.min(1, spd / 30));
          }
          if (b.y + BR > TY + TH) {
            b.y = TY + TH - BR;
            const spd = Math.hypot(b.vx, b.vy);
            const r = C_REST - Math.abs(b.vx) / (Math.abs(b.vx) + Math.abs(b.vy) + 1) * 0.1;
            b.vy = -Math.abs(b.vy) * r; b.vx *= 0.96;
            if (spd > 2) this.snd.play('cushion', Math.min(1, spd / 30));
          }
        }
      }

      // Ball-ball
      for (let i = 0; i < this.balls.length; i++) {
        if (this.balls[i].pocketed) continue;
        for (let j = i + 1; j < this.balls.length; j++) {
          if (this.balls[j].pocketed) continue;
          this.collide(this.balls[i], this.balls[j]);
        }
      }

      // Pockets
      for (const b of this.balls) {
        if (b.pocketed) continue;
        for (const p of POCKETS) {
          const pd = Math.hypot(b.x - p[0], b.y - p[1]);
          if (pd < PR + 1) {
            b.pocketed = true; b.vx = b.vy = 0;
            this.pocketedThisTurn.push(b);
            if (b === this.cueBall) this.cuePocketed = true;
            this.snd.play('pocket', 0.6);
            this.pocketAnims.push({ x: p[0], y: p[1], t: 0, num: b.num });
          } else if (pd < PR + BR + 4) {
            const pull = 0.08 * (1 - (pd - PR) / (BR + 4));
            b.vx += (p[0] - b.x) / pd * pull;
            b.vy += (p[1] - b.y) / pd * pull;
          }
        }
      }
    }

    // Friction
    let moving = false;
    for (const b of this.balls) {
      if (b.pocketed) continue;
      const spd = Math.hypot(b.vx, b.vy);
      if (spd < MIN_SPD) { b.vx = b.vy = 0; continue; }
      const f = spd > 30 ? FRIC : FRIC - (1 - spd / 30) * 0.004;
      b.vx *= f; b.vy *= f;
      b.rot += spd / BR * FDT * 5;
      moving = true;
    }
    if (!moving) this.onStop();
  }

  collide(a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.hypot(dx, dy), minD = BR * 2;
    if (d >= minD || d < 0.001) return;
    const nx = dx / d, ny = dy / d;
    const ov = minD - d;
    a.x -= nx * ov / 2; a.y -= ny * ov / 2;
    b.x += nx * ov / 2; b.y += ny * ov / 2;
    const dvn = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
    if (dvn <= 0) return;
    const j = dvn * (1 + B_REST) / 2;
    a.vx -= j * nx; a.vy -= j * ny;
    b.vx += j * nx; b.vy += j * ny;

    // Sound based on collision speed
    const impactSpd = Math.abs(dvn);
    if (impactSpd > 1) this.snd.play('ball', Math.min(1, impactSpd / 25));

    if (!this.firstHit) {
      if (a === this.cueBall) this.firstHit = b;
      else if (b === this.cueBall) this.firstHit = a;
    }
  }

  // ─── GAME RULES ────────────────────────────────
  _isOwn(b, pl) {
    if (!pl.type || b.num === 0 || b.num === 8) return false;
    return pl.type === 'solid' ? b.num <= 7 : b.num >= 9;
  }

  onStop() {
    this.phase = 'AIM';

    if (this.mode === 'practice') {
      if (this.cuePocketed) { this.cueBall.pocketed = false; this.phase = 'BALL_IN_HAND'; }
      this.firstHit = null; this.pocketedThisTurn = [];
      return;
    }

    let foul = false;
    if (this.cuePocketed) foul = true;
    if (!this.firstHit && !this.isBreak) foul = true;

    if (this.firstHit && this.cp.type && !this.isBreak) {
      const hn = this.firstHit.num;
      const ht = hn <= 7 ? 'solid' : (hn >= 9 ? 'stripe' : 'eight');
      if (ht === 'eight') {
        if (this.balls.filter(b => !b.pocketed && this._isOwn(b, this.cp)).length > 0) foul = true;
      } else if (ht !== this.cp.type) foul = true;
    }

    const eight = this.balls.find(b => b.num === 8);
    if (eight.pocketed) {
      const rem = this.balls.filter(b => !b.pocketed && this._isOwn(b, this.cp)).length;
      if (rem === 0 && !foul && this.cp.type) {
        this.phase = 'GAME_OVER'; this.winner = this.currentPlayer;
        this.showMsg(`Player ${this.winner} 승리!`);
      } else {
        this.phase = 'GAME_OVER'; this.winner = this.currentPlayer === 1 ? 2 : 1;
        this.showMsg(`Player ${this.winner} 승리!`);
      }
      return;
    }

    // Assign types first (before foul check message)
    let typeAssigned = false;
    if (!this.player1.type) {
      const first = this.pocketedThisTurn.find(b => b.num !== 0 && b.num !== 8);
      if (first) {
        if (first.num <= 7) { this.cp.type = 'solid'; this.op.type = 'stripe'; }
        else { this.cp.type = 'stripe'; this.op.type = 'solid'; }
        typeAssigned = true;
      }
    }

    const pOwn = this.pocketedThisTurn.some(b => this._isOwn(b, this.cp));
    this.isBreak = false;

    if (foul) {
      this.currentPlayer = this.currentPlayer === 1 ? 2 : 1;
      if (this.cuePocketed) this.cueBall.pocketed = false;
      this.phase = 'BALL_IN_HAND';
      this.showMsg(`파울! Player ${this.currentPlayer} 차례`);
    } else if (pOwn) {
      this.phase = 'AIM';
      if (typeAssigned) this.showMsg(this.cp.type === 'solid' ? '솔리드 배정! 계속 진행' : '스트라이프 배정! 계속 진행');
    } else {
      this.currentPlayer = this.currentPlayer === 1 ? 2 : 1;
      this.phase = 'AIM';
      if (typeAssigned) this.showMsg(this.cp.type === 'solid' ? '솔리드 배정!' : '스트라이프 배정!');
    }
    this.firstHit = null; this.pocketedThisTurn = [];
  }

  showMsg(m) { this.msg = m; this.msgTimer = 2; }

  // ─── DRAW ──────────────────────────────────────
  draw() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, W, H);

    if (!this.mode) { this.drawMenu(); return; }

    ctx.drawImage(this.tableImg, 0, 0);
    this.drawSidebar();
    this.drawHUD();

    if (this.phase === 'BALL_IN_HAND') this.drawBIH();

    // Pocket animations
    for (const pa of this.pocketAnims) {
      const prog = pa.t / 0.4;
      const scale = 1 - prog;
      const alpha = 1 - prog;
      if (scale > 0) {
        ctx.save();
        ctx.globalAlpha = alpha * 0.6;
        ctx.translate(pa.x, pa.y);
        ctx.scale(scale, scale);
        ctx.drawImage(this.ballImgs[pa.num], -this.ballImgs[pa.num].width / 2, -this.ballImgs[pa.num].height / 2);
        ctx.restore();
      }
    }

    // Shadows (softer, offset for lamp)
    for (const b of this.balls) {
      if (b.pocketed) continue;
      ctx.save();
      ctx.globalAlpha = 0.2;
      const sg = ctx.createRadialGradient(b.x + 3, b.y + 4, BR * 0.3, b.x + 3, b.y + 4, BR + 3);
      sg.addColorStop(0, 'rgba(0,0,0,0.4)');
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.ellipse(b.x + 3, b.y + 4, BR + 3, BR * 0.85 + 2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // Balls (draw from 2x canvas, scaled down for crisp rendering)
    for (const b of this.balls) {
      if (b.pocketed) continue;
      const img = this.ballImgs[b.num];
      const drawSz = img.width / 2; // 2x rendered, draw at half size
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.rot);
      ctx.drawImage(img, -drawSz / 2, -drawSz / 2, drawSz, drawSz);
      ctx.restore();
    }

    // Cue and guide
    if ((this.phase === 'AIM' || this.phase === 'CUE_ANIM') && !this.cueBall.pocketed) {
      if (this.phase === 'AIM') this.drawGuide();
      this.drawCue();
    }
    if (this.charging) this.drawPower();

    // Message
    if (this.msgTimer > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, this.msgTimer);
      // Message background
      const tw = ctx.measureText(this.msg).width || 200;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      this._rrect(ctx, SB + (W - SB) / 2 - tw / 2 - 30, TY + TH / 2 - 25, tw + 60, 50, 10);
      ctx.fill();
      ctx.fillStyle = '#ffd700'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
      ctx.fillText(this.msg, SB + (W - SB) / 2, TY + TH / 2 + 5);
      ctx.restore();
    }

    if (this.phase === 'GAME_OVER') this.drawGO();
  }

  // ─── MENU ──────────────────────────────────────
  drawMenu() {
    const ctx = this.ctx;
    // Dark background with subtle gradient
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0a1020'); bg.addColorStop(1, '#0e1520');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // Grid pattern
    ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    // Ambient light
    const ag = ctx.createRadialGradient(W / 2, H / 2 - 80, 0, W / 2, H / 2, 400);
    ag.addColorStop(0, 'rgba(40,80,120,0.08)'); ag.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ag; ctx.fillRect(0, 0, W, H);

    // Title
    ctx.fillStyle = '#e8e8e8'; ctx.font = 'bold 56px Arial'; ctx.textAlign = 'center';
    ctx.fillText('8 Ball Pool', W / 2, H / 2 - 130);

    // Subtitle with shadow
    ctx.fillStyle = '#666'; ctx.font = '22px Arial';
    ctx.fillText('포켓볼 게임', W / 2, H / 2 - 88);

    this.menuBtns = {};
    this._mbtn('연습 모드', W / 2, H / 2 - 10, 260, 54, '#28a746', 'practice');
    this._mbtn('2인 대전', W / 2, H / 2 + 60, 260, 54, '#4a90d0', '2player');

    // Footer
    ctx.fillStyle = '#444'; ctx.font = '13px Arial';
    ctx.fillText('ESC: 메뉴  |  R: 재시작', W / 2, H - 30);
  }

  _mbtn(text, cx, cy, w, h, color, id) {
    const ctx = this.ctx, x = cx - w / 2, y = cy - h / 2;
    const hov = this.mouse.x >= x && this.mouse.x <= x + w && this.mouse.y >= y && this.mouse.y <= y + h;

    // Button shadow
    ctx.save();
    this._rrect(ctx, x + 2, y + 3, w, h, 10);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
    ctx.restore();

    // Button body
    this._rrect(ctx, x, y, w, h, 10);
    const bg = ctx.createLinearGradient(x, y, x, y + h);
    bg.addColorStop(0, color); bg.addColorStop(1, this._darken(color, 0.3));
    ctx.fillStyle = bg; ctx.fill();

    if (hov) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
      this._rrect(ctx, x, y, w, h, 10); ctx.stroke();
    }

    ctx.fillStyle = '#fff'; ctx.font = 'bold 19px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, cx, cy); ctx.textBaseline = 'alphabetic';
    this.menuBtns[id] = { x, y, w, h };
  }

  _darken(hex, amt) {
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return `rgb(${r * (1 - amt) | 0},${g * (1 - amt) | 0},${b * (1 - amt) | 0})`;
  }

  // ─── SIDEBAR ───────────────────────────────────
  drawSidebar() {
    const ctx = this.ctx;
    // Gradient sidebar
    const sbg = ctx.createLinearGradient(0, 0, SB, 0);
    sbg.addColorStop(0, '#1a2035'); sbg.addColorStop(1, '#1c2438');
    ctx.fillStyle = sbg; ctx.fillRect(0, 0, SB, H);
    ctx.strokeStyle = '#303855'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(SB, 0); ctx.lineTo(SB, H); ctx.stroke();

    ctx.fillStyle = '#e0e0e0'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
    ctx.fillText('8 Ball Pool', SB / 2, 35);

    if (this.mode === 'practice') {
      ctx.fillStyle = '#aaa'; ctx.font = '15px Arial'; ctx.fillText('연습 모드', SB / 2, 65);
      const rem = this.balls.filter(b => !b.pocketed && b.num > 0);
      ctx.fillStyle = '#888'; ctx.font = '13px Arial'; ctx.fillText(`남은 공: ${rem.length}`, SB / 2, 95);
      let bx = 20, by = 120;
      for (const b of rem) { this.drawMini(bx + 10, by, b.num, 10); bx += 24; if (bx > SB - 20) { bx = 20; by += 26; } }
    } else {
      this.drawPC(1, 60); this.drawPC(2, 260);
    }

    // New game btn
    ctx.fillStyle = '#28a746'; this._rrect(ctx, 40, H - 75, SB - 80, 38, 6); ctx.fill();
    const hov = this.mouse.x >= 40 && this.mouse.x <= SB - 40 && this.mouse.y >= H - 75 && this.mouse.y <= H - 37;
    if (hov) { ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill(); }
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('새 게임', SB / 2, H - 56); ctx.textBaseline = 'alphabetic';
  }

  drawPC(pn, y) {
    const ctx = this.ctx;
    const pl = pn === 1 ? this.player1 : this.player2;
    const act = this.currentPlayer === pn;
    const cx = 12, cw = SB - 24, ch = 180;

    this._rrect(ctx, cx, y, cw, ch, 8); ctx.fillStyle = act ? '#263050' : '#1e2438'; ctx.fill();
    if (act) {
      ctx.strokeStyle = '#4a90d0'; ctx.lineWidth = 2; this._rrect(ctx, cx, y, cw, ch, 8); ctx.stroke();
      // Glow effect
      ctx.save(); ctx.globalAlpha = 0.1;
      ctx.strokeStyle = '#4a90d0'; ctx.lineWidth = 6; this._rrect(ctx, cx, y, cw, ch, 8); ctx.stroke();
      ctx.restore();
    }

    // Avatar
    ctx.fillStyle = pn === 1 ? '#4a90d0' : '#d04a4a';
    ctx.beginPath(); ctx.arc(48, y + 35, 20, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`P${pn}`, 48, y + 36); ctx.textBaseline = 'alphabetic';

    ctx.fillStyle = '#e0e0e0'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'left';
    ctx.fillText(pl.name, 78, y + 32);
    if (pl.type) { ctx.fillStyle = '#999'; ctx.font = '12px Arial'; ctx.fillText(pl.type === 'solid' ? '솔리드 (1-7)' : '스트라이프 (9-15)', 78, y + 50); }

    if (pl.type) {
      const rem = this.balls.filter(b => !b.pocketed && this._isOwn(b, pl));
      if (rem.length === 0) {
        ctx.fillStyle = '#ffd700'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'left';
        ctx.fillText('8번 공을 넣으세요!', 20, y + 85);
      } else {
        let bx = 24; for (const b of rem) { this.drawMini(bx, y + 80, b.num, 9); bx += 22; }
      }
      ctx.fillStyle = '#777'; ctx.font = '11px Arial'; ctx.textAlign = 'left'; ctx.fillText(`남은 공: ${rem.length}`, 20, y + 108);
      const poc = this.balls.filter(b => b.pocketed && this._isOwn(b, pl));
      if (poc.length > 0) { let bx = 24; for (const b of poc) { ctx.save(); ctx.globalAlpha = .35; this.drawMini(bx, y + 130, b.num, 7); ctx.restore(); bx += 18; } }
    }

    if (act && this.phase !== 'GAME_OVER') { ctx.fillStyle = '#4a90d0'; ctx.font = '12px Arial'; ctx.textAlign = 'left'; ctx.fillText('● 차례', 20, y + 165); }
  }

  // ─── HUD ───────────────────────────────────────
  drawHUD() {
    const ctx = this.ctx;
    if (this.mode === '2player') {
      const txt = this.currentPlayer === 1 ? `${this.player1.name}의 차례` : `${this.player2.name}의 차례`;
      ctx.fillStyle = '#e0e0e0'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center';
      ctx.fillText(txt, SB + (W - SB) / 2, TY - CS - 35);
    }
    if (this.phase === 'BALL_IN_HAND') {
      ctx.fillStyle = '#e0e0e0'; ctx.font = '14px Arial'; ctx.textAlign = 'center';
      ctx.fillText('클릭하여 큐볼 배치', SB + (W - SB) / 2, TY + TH + CS + 25);
    }
  }

  drawBIH() {
    const ctx = this.ctx, { x, y } = this.mouse;
    const cx = Math.max(TX + BR, Math.min(TX + TW - BR, x));
    const cy = Math.max(TY + BR, Math.min(TY + TH - BR, y));
    let valid = x >= TX && x <= TX + TW && y >= TY && y <= TY + TH;
    if (valid) for (const b of this.balls) if (!b.pocketed && b !== this.cueBall && Math.hypot(b.x - cx, b.y - cy) < BR * 2 + 2) { valid = false; break; }
    ctx.save(); ctx.globalAlpha = .5; ctx.drawImage(this.ballImgs[0], cx - 14, cy - 14); ctx.restore();
    ctx.strokeStyle = valid ? '#4f4' : '#f44'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, BR + 3, 0, Math.PI * 2); ctx.stroke();
  }

  // ─── GUIDE LINE ────────────────────────────────
  drawGuide() {
    const ctx = this.ctx, cb = this.cueBall;
    const a = this.charging ? this.shotAngle : this.cueAngle + Math.PI;
    const dx = Math.cos(a), dy = Math.sin(a), maxL = 600;

    let hitB = null, hitD = maxL, hcx = 0, hcy = 0;
    for (const b of this.balls) {
      if (b.pocketed || b === cb) continue;
      const ox = b.x - cb.x, oy = b.y - cb.y;
      const proj = ox * dx + oy * dy;
      if (proj < BR) continue;
      const perp = Math.abs(ox * (-dy) + oy * dx), minD = BR * 2;
      if (perp < minD) {
        const ins = minD * minD - perp * perp;
        if (ins > 0) { const cd = proj - Math.sqrt(ins); if (cd > BR && cd < hitD) { hitD = cd; hitB = b; hcx = cb.x + dx * cd; hcy = cb.y + dy * cd; } }
      }
    }

    // Dashed guide
    ctx.save(); ctx.setLineDash([5, 5]);
    const endD = hitB ? hitD : maxL;
    const g1x = cb.x + dx * (BR + 3), g1y = cb.y + dy * (BR + 3);
    const g2x = cb.x + dx * endD, g2y = cb.y + dy * endD;
    const grad = ctx.createLinearGradient(g1x, g1y, g2x, g2y);
    grad.addColorStop(0, 'rgba(80,160,255,0.8)'); grad.addColorStop(1, 'rgba(80,160,255,0.15)');
    ctx.strokeStyle = grad; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(g1x, g1y); ctx.lineTo(g2x, g2y); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();

    if (hitB) {
      ctx.strokeStyle = 'rgba(80,160,255,0.5)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(hcx, hcy, BR, 0, Math.PI * 2); ctx.stroke();

      const nx = hitB.x - hcx, ny = hitB.y - hcy, nl = Math.hypot(nx, ny);
      if (nl > 0.01) {
        const nnx = nx / nl, nny = ny / nl;

        ctx.save(); ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(255,200,50,0.7)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(hitB.x, hitB.y); ctx.lineTo(hitB.x + nnx * 120, hitB.y + nny * 120); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();

        const dot = dx * nnx + dy * nny, rdx2 = dx - dot * nnx, rdy2 = dy - dot * nny, rl = Math.hypot(rdx2, rdy2);
        if (rl > 0.01) {
          ctx.save(); ctx.setLineDash([3, 4]); ctx.strokeStyle = 'rgba(80,160,255,0.4)'; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(hcx, hcy); ctx.lineTo(hcx + (rdx2 / rl) * 90, hcy + (rdy2 / rl) * 90); ctx.stroke();
          ctx.setLineDash([]); ctx.restore();
        }
      }
      ctx.strokeStyle = 'rgba(255,200,50,0.6)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(hcx, hcy, BR + 2, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // ─── CUE STICK ─────────────────────────────────
  drawCue() {
    const ctx = this.ctx, cb = this.cueBall;
    let a = this.cueAngle;
    let pw = this.charging ? this.power : 0;
    let extraGap = 0;

    // Cue animation
    if (this.cueAnim) {
      const ca = this.cueAnim;
      a = ca.lockedAngle;
      if (ca.phase === 'back') {
        const prog = ca.t / ca.duration;
        const ease = prog < 0.5 ? 2 * prog * prog : 1 - Math.pow(-2 * prog + 2, 2) / 2;
        extraGap = ease * ca.power * 50;
      } else if (ca.phase === 'strike') {
        const prog = ca.t / ca.strikeDur;
        extraGap = (1 - prog) * ca.power * 50 - prog * 5;
        if (extraGap < -3) extraGap = -3;
      } else if (ca.phase === 'follow') {
        extraGap = -3 + ca.t / 0.15 * 3;
        if (extraGap > 0) extraGap = 0;
      }
    }

    const gap = BR + 4 + pw * 35 + extraGap, len = 240;
    const ax = Math.cos(a), ay = Math.sin(a), px = -ay, py = ax;
    const tx = cb.x + ax * gap, ty = cb.y + ay * gap;
    const ex = cb.x + ax * (gap + len), ey = cb.y + ay * (gap + len);
    const tw = 2, ew = 5.5;

    // Cue shadow
    ctx.save(); ctx.globalAlpha = 0.2;
    ctx.beginPath();
    ctx.moveTo(tx + px * tw + 2, ty + py * tw + 3);
    ctx.lineTo(ex + px * ew + 2, ey + py * ew + 3);
    ctx.lineTo(ex - px * ew + 2, ey - py * ew + 3);
    ctx.lineTo(tx - px * tw + 2, ty - py * tw + 3);
    ctx.closePath(); ctx.fillStyle = '#000'; ctx.fill();
    ctx.restore();

    // Cue body
    ctx.beginPath();
    ctx.moveTo(tx + px * tw, ty + py * tw); ctx.lineTo(ex + px * ew, ey + py * ew);
    ctx.lineTo(ex - px * ew, ey - py * ew); ctx.lineTo(tx - px * tw, ty - py * tw); ctx.closePath();
    const grad = ctx.createLinearGradient(tx, ty, ex, ey);
    grad.addColorStop(0, '#f5e6c8');
    grad.addColorStop(0.03, '#ebd8a8');
    grad.addColorStop(0.06, '#222');
    grad.addColorStop(0.08, '#ebd8a8');
    grad.addColorStop(0.15, '#c88010');
    grad.addColorStop(0.4, '#b87015');
    grad.addColorStop(0.6, '#a06008');
    grad.addColorStop(0.85, '#7a4005');
    grad.addColorStop(1, '#3a1805');
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = .5; ctx.stroke();

    // Ferrule (white tip)
    ctx.fillStyle = '#ddd';
    ctx.beginPath(); ctx.arc(tx, ty, tw + .8, 0, Math.PI * 2); ctx.fill();
    // Tip (blue chalk)
    ctx.fillStyle = '#3870b8';
    ctx.beginPath(); ctx.arc(tx, ty, tw, 0, Math.PI * 2); ctx.fill();
  }

  // ─── POWER BAR ─────────────────────────────────
  drawPower() {
    const ctx = this.ctx, cb = this.cueBall;
    const bw = 140, bh = 14, bx = cb.x - bw / 2, by = cb.y - 35;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    this._rrect(ctx, bx - 3, by - 3, bw + 6, bh + 6, 4); ctx.fill();
    ctx.strokeStyle = 'rgba(200,160,8,0.8)'; ctx.lineWidth = 1.5;
    this._rrect(ctx, bx - 1, by - 1, bw + 2, bh + 2, 3); ctx.stroke();

    const fw = bw * this.power;
    if (fw > 0) {
      const grad = ctx.createLinearGradient(bx, 0, bx + bw, 0);
      grad.addColorStop(0, '#4a4'); grad.addColorStop(0.4, '#da5'); grad.addColorStop(0.7, '#d62'); grad.addColorStop(1, '#d33');
      ctx.save();
      this._rrect(ctx, bx, by, fw, bh, 2); ctx.clip();
      ctx.fillStyle = grad; ctx.fillRect(bx, by, bw, bh);
      // Shine
      const sg = ctx.createLinearGradient(0, by, 0, by + bh);
      sg.addColorStop(0, 'rgba(255,255,255,0.25)'); sg.addColorStop(0.5, 'rgba(255,255,255,0)'); sg.addColorStop(1, 'rgba(0,0,0,0.15)');
      ctx.fillStyle = sg; ctx.fillRect(bx, by, fw, bh);
      ctx.restore();
    }

    // Power percentage
    const pct = (this.power * 100) | 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
    ctx.fillText(`${pct}%`, cb.x, by - 6);
  }

  // ─── GAME OVER ─────────────────────────────────
  drawGO() {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(SB, 0, W - SB, H);

    const wn = this.winner === 1 ? this.player1 : this.player2;

    // Trophy-like glow
    const gx = SB + (W - SB) / 2, gy = H / 2 - 40;
    const gg = ctx.createRadialGradient(gx, gy, 0, gx, gy, 120);
    gg.addColorStop(0, 'rgba(255,215,0,0.15)'); gg.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(gx, gy, 120, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 44px Arial'; ctx.textAlign = 'center';
    ctx.fillText(`${wn.name} 승리!`, gx, gy + 10);
    ctx.fillStyle = '#ccc'; ctx.font = '18px Arial';
    ctx.fillText('클릭하여 다시 시작', gx, gy + 55);
  }

  // ─── MINI BALL ─────────────────────────────────
  drawMini(x, y, num, r) {
    const ctx = this.ctx, col = COLORS[num], stripe = num >= 9;
    ctx.save(); ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
    if (num === 0) { ctx.fillStyle = '#eee'; }
    else if (stripe) { ctx.fillStyle = '#eee'; ctx.fillRect(x - r, y - r, r * 2, r * 2); ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`; ctx.fillRect(x - r, y - r * .45, r * 2, r * .9); }
    else ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
    const g = ctx.createRadialGradient(x - r * .3, y - r * .3, 0, x, y, r);
    g.addColorStop(0, 'rgba(255,255,255,0.3)'); g.addColorStop(1, 'rgba(0,0,0,0.15)');
    ctx.fillStyle = g; ctx.fillRect(x - r, y - r, r * 2, r * 2);
    ctx.restore();
    if (num > 0 && r >= 8) {
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x, y, r * .35, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.font = `bold ${Math.max(6, r * .5) | 0}px Arial`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(String(num), x, y + .5); ctx.textBaseline = 'alphabetic';
    }
  }

  // ─── LOOP ──────────────────────────────────────
  loop(t) {
    const dt = Math.min((t - this.lastT) / 1000, 0.05); this.lastT = t;
    this.update(dt); this.draw();
    requestAnimationFrame(t2 => this.loop(t2));
  }
}

new Game();
</script>
